// ============ ANNEAU DE PROGRESSION ============
const ProgressRing = ({ value, goal, size = 200 }) => {
  const stroke = 14;
  const radius = (size - stroke) / 2;
  const circumference = radius * 2 * Math.PI;
  const pct = Math.min(value / goal, 1);
  const offset = circumference - pct * circumference;
  const ratio = value / goal;
  let color = "#10b981"; // vert
  if (ratio > 0.85 && ratio <= 1) color = "#f59e0b"; // orange
  if (ratio > 1) color = "#ef4444"; // rouge
  return (
    <div className="relative" style={{ width: size, height: size }}>
      <svg width={size} height={size} className="progress-ring">
        <circle cx={size/2} cy={size/2} r={radius} stroke="rgba(71, 85, 105, 0.3)" strokeWidth={stroke} fill="transparent" />
        <circle
          cx={size/2} cy={size/2} r={radius}
          stroke={color} strokeWidth={stroke} fill="transparent"
          strokeDasharray={circumference}
          strokeDashoffset={offset}
          strokeLinecap="round"
          className="progress-ring__circle"
        />
      </svg>
      <div className="absolute inset-0 flex flex-col items-center justify-center">
        <div className="text-xs uppercase tracking-widest text-slate-400">Consommé</div>
        <div className="text-4xl font-bold text-white mt-1">{Math.round(value)}</div>
        <div className="text-sm text-slate-300 mt-1">/ {goal} kcal</div>
        <div className="text-xs text-slate-400 mt-2">
          {value < goal ? `${Math.round(goal - value)} restantes` : `+${Math.round(value - goal)} dépassé`}
        </div>
      </div>
    </div>
  );
};

// ============ BARRE MACRO ============
const MacroBar = ({ label, value, goal, color }) => {
  const pct = Math.min((value / goal) * 100, 100);
  return (
    <div className="flex-1">
      <div className="flex justify-between text-xs mb-1.5">
        <span className="text-slate-300 font-medium">{label}</span>
        <span className="text-slate-400">{Math.round(value)}/{goal}g</span>
      </div>
      <div className="h-2 bg-slate-700/50 rounded-full overflow-hidden">
        <div className="h-full rounded-full transition-all duration-500" style={{ width: `${pct}%`, background: color }}></div>
      </div>
    </div>
  );
};

      quantity,
      unitMode: selectedFood.unitMode,
      cal: Math.round(selectedFood.cal * factor),
      p: +(selectedFood.p * factor).toFixed(1),
      c: +(selectedFood.c * factor).toFixed(1),
      f: +(selectedFood.f * factor).toFixed(1),
      photo,
      time: new Date().toLocaleTimeString('fr-FR', { hour: '2-digit', minute: '2-digit' }),
    };
  };

  const final = calcFinal();

  return (
    <div className="fixed inset-0 z-50 bg-black/70 backdrop-blur-sm anim-fade flex items-end sm:items-center justify-center" onClick={onClose}>
      <div className="w-full sm:max-w-lg bg-slate-800 sm:rounded-3xl rounded-t-3xl max-h-[90vh] flex flex-col anim-slide" onClick={e => e.stopPropagation()}>
        {/* Header */}
        <div className="flex items-center justify-between p-5 border-b border-slate-700/60">
          <div className="flex items-center gap-3">
            {step > 1 && (
              <button onClick={() => setStep(step - 1)} className="text-slate-300 p-1 -ml-1">
                <Icon name="arrow" size={22} />
              </button>
            )}
            <h2 className="text-xl font-bold text-white">
              {step === 1 && "Ajouter un repas"}
              {step === 2 && "Choisir l'aliment"}
              {step === 3 && "Quantité"}
            </h2>
          </div>
          <button onClick={onClose} className="text-slate-400 p-1">
            <Icon name="close" size={24} />
          </button>
        </div>

        {/* Étape 1 : Photo */}
        {step === 1 && (
          <div className="p-6 overflow-y-auto">
            <p className="text-slate-300 text-sm mb-6 text-center">
              Prends ton repas en photo ou importe une image pour identifier ce que tu manges.
            </p>
            <div className="grid grid-cols-2 gap-3 mb-4">
              <button
                onClick={() => cameraInput.current?.click()}
                className="glass rounded-2xl p-6 flex flex-col items-center gap-3 text-white card-hover"
              >
                <div className="w-14 h-14 rounded-full bg-emerald-500/20 flex items-center justify-center text-emerald-400">
                  <Icon name="camera" size={28} />
                </div>
                <span className="font-semibold">Prendre photo</span>
                <span className="text-xs text-slate-400 text-center">Utilise ta caméra</span>
              </button>
              <button
                onClick={() => fileInput.current?.click()}
                className="glass rounded-2xl p-6 flex flex-col items-center gap-3 text-white card-hover"
              >
                <div className="w-14 h-14 rounded-full bg-blue-500/20 flex items-center justify-center text-blue-400">
                  <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
                </div>
                <span className="font-semibold">Galerie</span>
                <span className="text-xs text-slate-400 text-center">Importer une image</span>
              </button>
            </div>
            <button
              onClick={() => setStep(2)}
              className="w-full text-slate-400 text-sm py-3 underline"
            >
              Passer l'étape photo
            </button>
            <input ref={cameraInput} type="file" accept="image/*" capture="environment" className="hidden" onChange={handlePhoto} />
            <input ref={fileInput} type="file" accept="image/*" className="hidden" onChange={handlePhoto} />
          </div>
        )}

        {/* Étape 2 : Sélection aliment */}
        {step === 2 && (
          <div className="flex flex-col overflow-hidden flex-1">
            {photo && (
              <div className="px-5 pt-4">
                <img src={photo} alt="repas" className="w-full h-32 object-cover rounded-xl" />
              </div>
            )}
            <div className="p-5 pb-3">
              <div className="relative">
                <div className="absolute left-3 top-1/2 -translate-y-1/2 text-slate-400">
                  <Icon name="search" size={18} />
                </div>
                <input
                  type="text"
                  value={search}
                  onChange={e => setSearch(e.target.value)}
                  placeholder="Rechercher un aliment..."
                  className="w-full bg-slate-700/50 text-white placeholder-slate-400 rounded-xl pl-10 pr-4 py-3 outline-none focus:ring-2 focus:ring-emerald-500"
                />
              </div>
            </div>
            <div className="px-5 pb-3 overflow-x-auto">
              <div className="flex gap-2">
                {categories.map(cat => (
                  <button
                    key={cat}
                    onClick={() => setActiveCat(cat)}
                    className={`px-3 py-1.5 rounded-full text-xs font-medium whitespace-nowrap transition ${activeCat === cat ? 'bg-emerald-500 text-white' : 'bg-slate-700/50 text-slate-300'}`}
                  >
                    {cat}
                  </button>
                ))}
              </div>
            </div>
            <div className="flex-1 overflow-y-auto px-5 pb-5">
              <div className="space-y-2">
                {filtered.map((food, i) => (
                  <button
                    key={i}
                    onClick={() => { setSelectedFood(food); setQuantity(food.unitMode ? 1 : 100); setStep(3); }}
                    className="w-full glass rounded-xl p-3 flex items-center gap-3 card-hover"
                  >
                    <div className="text-3xl">{food.emoji}</div>
                    <div className="flex-1 text-left">
                      <div className="text-white font-medium">{food.name}</div>
                      <div className="text-xs text-slate-400">
                        {food.cal} kcal {food.unitMode ? "/ unité" : "/ 100g"} · P {food.p}g · G {food.c}g · L {food.f}g
                      </div>
                    </div>
                  </button>
                ))}
                {filtered.length === 0 && (
                  <div className="text-center text-slate-400 py-8">Aucun aliment trouvé</div>
                )}
              </div>
            </div>
          </div>
        )}

        {/* Étape 3 : Quantité */}
        {step === 3 && selectedFood && final && (
          <div className="p-5 overflow-y-auto">
            <div className="glass rounded-2xl p-5 mb-5 text-center">
              <div className="text-5xl mb-2">{selectedFood.emoji}</div>
              <div className="text-xl font-bold text-white">{selectedFood.name}</div>
            </div>

            <div className="mb-5">
              <label className="text-sm text-slate-300 mb-2 block font-medium">
                Quantité {selectedFood.unitMode ? "(unités)" : "(grammes)"}
              </label>
              <div className="flex items-center gap-3">
                <button
                  onClick={() => setQuantity(Math.max(selectedFood.unitMode ? 1 : 10, quantity - (selectedFood.unitMode ? 1 : 10)))}
                  className="w-12 h-12 rounded-full bg-slate-700 text-white text-2xl flex items-center justify-center"
                >−</button>
                <input
                  type="number"
                  value={quantity}
                  onChange={e => setQuantity(Math.max(0, +e.target.value))}
                  className="flex-1 bg-slate-700/50 text-white text-center text-2xl font-bold rounded-xl py-3 outline-none focus:ring-2 focus:ring-emerald-500"
                />
                <button
                  onClick={() => setQuantity(quantity + (selectedFood.unitMode ? 1 : 10))}
                  className="w-12 h-12 rounded-full bg-slate-700 text-white text-2xl flex items-center justify-center"
                >+</button>
              </div>
              {!selectedFood.unitMode && (
                <div className="flex gap-2 mt-3">
                  {[50, 100, 150, 200, 300].map(g => (
                    <button key={g} onClick={() => setQuantity(g)} className="flex-1 bg-slate-700/50 text-slate-300 text-xs py-2 rounded-lg">
                      {g}g
                    </button>
                  ))}
                </div>
              )}
            </div>

            <div className="glass rounded-2xl p-4 mb-5">
              <div className="text-center mb-3">
                <div className="text-xs text-slate-400 uppercase tracking-wider">Total</div>
                <div className="text-4xl font-bold text-emerald-400">{final.cal}</div>
                <div className="text-xs text-slate-400">kcal</div>
              </div>
              <div className="grid grid-cols-3 gap-3 text-center">
                <div>
                  <div className="text-xs text-slate-400">Protéines</div>
                  <div className="text-white font-semibold">{final.p}g</div>
                </div>
                <div>
                  <div className="text-xs text-slate-400">Glucides</div>
                  <div className="text-white font-semibold">{final.c}g</div>
                </div>
                <div>
                  <div className="text-xs text-slate-400">Lipides</div>
                  <div className="text-white font-semibold">{final.f}g</div>
                </div>
              </div>
            </div>

            <button
              onClick={() => { onAdd(final); onClose(); }}
              className="btn-primary w-full py-4 rounded-2xl text-white font-bold text-lg flex items-center justify-center gap-2"
            >
              <Icon name="check" size={22} />
              Ajouter au journal
            </button>
          </div>
        )}
      </div>
    </div>
  );
};

// ============ PAGE PARAMÈTRES ============
const SettingsPanel = ({ data, setData, onClose }) => {
  const [goal, setGoal] = useState(data.goal);
  const [goalP, setGoalP] = useState(data.goalP);
  const [goalC, setGoalC] = useState(data.goalC);
  const [goalF, setGoalF] = useState(data.goalF);

  const save = () => {
    const newData = { ...data, goal: +goal, goalP: +goalP, goalC: +goalC, goalF: +goalF };
    setData(newData); saveData(newData);
    onClose();
  };

  const resetAll = () => {
    if (confirm("Supprimer TOUTES les données (historique + paramètres) ?")) {
      localStorage.removeItem('nkc_data');
      window.location.reload();
    }
  };

  return (
    <div className="fixed inset-0 z-50 bg-black/70 backdrop-blur-sm anim-fade flex items-end sm:items-center justify-center" onClick={onClose}>
      <div className="w-full sm:max-w-lg bg-slate-800 sm:rounded-3xl rounded-t-3xl max-h-[90vh] overflow-y-auto anim-slide" onClick={e => e.stopPropagation()}>
        <div className="flex items-center justify-between p-5 border-b border-slate-700/60">
          <h2 className="text-xl font-bold text-white">Paramètres</h2>
          <button onClick={onClose} className="text-slate-400"><Icon name="close" size={24} /></button>
        </div>
        <div className="p-5 space-y-5">
          <div>
            <label className="text-sm text-slate-300 mb-2 block font-medium">Objectif calorique quotidien</label>
            <input type="number" value={goal} onChange={e => setGoal(e.target.value)}
              className="w-full bg-slate-700/50 text-white rounded-xl px-4 py-3 outline-none focus:ring-2 focus:ring-emerald-500 text-lg" />
          </div>
          <div>
            <label className="text-sm text-slate-300 mb-2 block font-medium">Protéines (g)</label>
            <input type="number" value={goalP} onChange={e => setGoalP(e.target.value)}
              className="w-full bg-slate-700/50 text-white rounded-xl px-4 py-3 outline-none focus:ring-2 focus:ring-emerald-500" />
          </div>
          <div>
            <label className="text-sm text-slate-300 mb-2 block font-medium">Glucides (g)</label>
            <input type="number" value={goalC} onChange={e => setGoalC(e.target.value)}
              className="w-full bg-slate-700/50 text-white rounded-xl px-4 py-3 outline-none focus:ring-2 focus:ring-emerald-500" />
          </div>
          <div>
            <label className="text-sm text-slate-300 mb-2 block font-medium">Lipides (g)</label>
            <input type="number" value={goalF} onChange={e => setGoalF(e.target.value)}
              className="w-full bg-slate-700/50 text-white rounded-xl px-4 py-3 outline-none focus:ring-2 focus:ring-emerald-500" />
          </div>
          <button onClick={save} className="btn-primary w-full py-4 rounded-2xl text-white font-bold">
            Enregistrer
          </button>
          <button onClick={resetAll} className="w-full py-3 rounded-2xl text-red-400 border border-red-500/30">
            Réinitialiser toutes les données
          </button>
          <div className="text-center text-xs text-slate-500 pt-2">
            NKC — Suivi Calorique · Données stockées localement sur votre appareil
          </div>
        </div>
      </div>
    </div>
  );
};

// ============ HISTORIQUE ============
const HistoryView = ({ data, onClose }) => {
  const days = useMemo(() => {
    const arr = [];
    for (let i = 0; i < 14; i++) {
      const d = new Date(); d.setDate(d.getDate() - i);
      const key = dateKey(d);
      const meals = data.meals[key] || [];
      const cal = meals.reduce((s, m) => s + m.cal, 0);
      arr.push({ key, cal, count: meals.length, meals });
    }
    return arr;
  }, [data]);

  const maxCal = Math.max(data.goal, ...days.map(d => d.cal), 1);

  return (
    <div className="fixed inset-0 z-50 bg-black/70 backdrop-blur-sm anim-fade flex items-end sm:items-center justify-center" onClick={onClose}>
      <div className="w-full sm:max-w-lg bg-slate-800 sm:rounded-3xl rounded-t-3xl max-h-[90vh] flex flex-col anim-slide" onClick={e => e.stopPropagation()}>
        <div className="flex items-center justify-between p-5 border-b border-slate-700/60">
          <h2 className="text-xl font-bold text-white">Historique (14 jours)</h2>
          <button onClick={onClose} className="text-slate-400"><Icon name="close" size={24} /></button>
        </div>
        <div className="p-5 overflow-y-auto">
          <div className="space-y-2">
            {days.map(d => {
              const pct = (d.cal / maxCal) * 100;
              const ratio = d.cal / data.goal;
              let color = "bg-emerald-500";
              if (ratio > 0.85 && ratio <= 1) color = "bg-amber-500";
              if (ratio > 1) color = "bg-red-500";
              if (d.cal === 0) color = "bg-slate-600";
              return (
                <div key={d.key} className="glass rounded-xl p-3">
                  <div className="flex justify-between items-center mb-2">
                    <span className="text-white text-sm font-medium capitalize">
                      {d.key === todayKey() ? "Aujourd'hui" : formatDateFR(d.key)}
                    </span>
                    <span className="text-slate-300 text-sm">
                      {d.cal} kcal · {d.count} repas
                    </span>
                  </div>
                  <div className="h-2 bg-slate-700/50 rounded-full overflow-hidden">
                    <div className={`h-full ${color} transition-all`} style={{ width: `${Math.min(pct, 100)}%` }}></div>
                  </div>
                </div>
              );
            })}
          </div>
        </div>
      </div>
    </div>
  );
};

// ============ APP PRINCIPALE ============
const App = () => {
  const [data, setData] = useState(loadData);
  const [showAdd, setShowAdd] = useState(false);
  const [showSettings, setShowSettings] = useState(false);
  const [showHistory, setShowHistory] = useState(false);
  const [viewPhoto, setViewPhoto] = useState(null);

  const today = todayKey();
  const todayMeals = data.meals[today] || [];

  const totals = useMemo(() => {
    return todayMeals.reduce((acc, m) => ({
      cal: acc.cal + m.cal, p: acc.p + m.p, c: acc.c + m.c, f: acc.f + m.f,
    }), { cal: 0, p: 0, c: 0, f: 0 });
  }, [todayMeals]);

  const addMeal = (meal) => {
    const newData = {
      ...data,
      meals: { ...data.meals, [today]: [...todayMeals, meal] }
    };
    setData(newData); saveData(newData);
  };

  const removeMeal = (id) => {
    const newData = {
      ...data,
      meals: { ...data.meals, [today]: todayMeals.filter(m => m.id !== id) }
    };
    setData(newData); saveData(newData);
  };

  const dateLabel = new Date().toLocaleDateString('fr-FR', { weekday: 'long', day: 'numeric', month: 'long' });

  return (
    <div className="min-h-screen pb-28">
      {/* HEADER */}
      <header className="px-5 pt-8 pb-4 flex justify-between items-start">
        <div>
          <div className="flex items-center gap-2 mb-1">
            <div className="w-9 h-9 rounded-xl bg-gradient-to-br from-emerald-400 to-emerald-600 flex items-center justify-center text-xl shadow-lg glow-green">
              🍎
            </div>
            <h1 className="text-2xl font-black text-white tracking-tight">NKC</h1>
          </div>
          <p className="text-xs text-slate-400 capitalize">{dateLabel}</p>
        </div>
        <div className="flex gap-2">
          <button onClick={() => setShowHistory(true)} className="w-10 h-10 rounded-xl glass flex items-center justify-center text-slate-300">
            <Icon name="history" size={20} />
          </button>
          <button onClick={() => setShowSettings(true)} className="w-10 h-10 rounded-xl glass flex items-center justify-center text-slate-300">
            <Icon name="settings" size={20} />
          </button>
        </div>
      </header>

      {/* ANNEAU DE PROGRESSION */}
      <div className="flex justify-center mt-4 mb-6">
        <ProgressRing value={totals.cal} goal={data.goal} size={220} />
      </div>

      {/* MACRONUTRIMENTS */}
      <div className="px-5 mb-6">
        <div className="glass rounded-2xl p-4">
          <h3 className="text-xs uppercase tracking-widest text-slate-400 mb-3 flex items-center gap-2">
            <Icon name="flame" size={14} /> Macronutriments
          </h3>
          <div className="space-y-3">
            <MacroBar label="Protéines" value={totals.p} goal={data.goalP} color="linear-gradient(90deg, #3b82f6, #2563eb)" />
            <MacroBar label="Glucides" value={totals.c} goal={data.goalC} color="linear-gradient(90deg, #f59e0b, #d97706)" />
            <MacroBar label="Lipides" value={totals.f} goal={data.goalF} color="linear-gradient(90deg, #ec4899, #db2777)" />
          </div>
        </div>
      </div>

      {/* REPAS DU JOUR */}
      <div className="px-5">
        <div className="flex items-center justify-between mb-3">
          <h3 className="text-lg font-bold text-white">Repas du jour</h3>
          <span className="text-xs text-slate-400">{todayMeals.length} repas</span>
        </div>
        {todayMeals.length === 0 ? (
          <div className="glass rounded-2xl p-8 text-center">
            <div className="text-5xl mb-3">🍽️</div>
            <p className="text-slate-300 font-medium">Aucun repas enregistré</p>
            <p className="text-slate-400 text-sm mt-1">Appuie sur le bouton + pour ajouter ton premier repas</p>
          </div>
        ) : (
          <div className="space-y-2">
            {todayMeals.slice().reverse().map(m => (
              <div key={m.id} className="glass rounded-2xl p-3 flex items-center gap-3 anim-slide">
                {m.photo ? (
                  <button onClick={() => setViewPhoto(m.photo)} className="shrink-0">
                    <img src={m.photo} alt="" className="w-14 h-14 rounded-xl object-cover" />
                  </button>
                ) : (
                  <div className="w-14 h-14 rounded-xl bg-slate-700/50 flex items-center justify-center text-3xl shrink-0">
                    {m.emoji}
                  </div>
                )}
                <div className="flex-1 min-w-0">
                  <div className="flex items-center gap-2">
                    <span className="text-white font-medium truncate">{m.name}</span>
                  </div>
                  <div className="text-xs text-slate-400">
                    {m.quantity}{m.unitMode ? " u." : "g"} · {m.time}
                  </div>
                  <div className="text-xs text-slate-400 mt-0.5">
                    P {m.p}g · G {m.c}g · L {m.f}g
                  </div>
                </div>
                <div className="text-right shrink-0">
                  <div className="text-emerald-400 font-bold text-lg">{m.cal}</div>
                  <div className="text-xs text-slate-400">kcal</div>
                </div>
                <button onClick={() => removeMeal(m.id)} className="text-slate-500 hover:text-red-400 p-1">
                  <Icon name="trash" size={18} />
                </button>
              </div>
            ))}
          </div>
        )}
      </div>

      {/* BOUTON FLOTTANT */}
      <button
        onClick={() => setShowAdd(true)}
        className="fixed bottom-6 left-1/2 -translate-x-1/2 btn-primary rounded-full shadow-2xl glow-green flex items-center gap-2 px-6 py-4 text-white font-bold z-30"
      >
        <Icon name="camera" size={22} />
        <span>Ajouter un repas</span>
      </button>

      {/* MODALES */}
      {showAdd && <AddMealModal onClose={() => setShowAdd(false)} onAdd={addMeal} />}
      {showSettings && <SettingsPanel data={data} setData={setData} onClose={() => setShowSettings(false)} />}
      {showHistory && <HistoryView data={data} onClose={() => setShowHistory(false)} />}
      {viewPhoto && (
        <div className="fixed inset-0 z-50 bg-black/90 flex items-center justify-center p-4 anim-fade" onClick={() => setViewPhoto(null)}>
          <img src={viewPhoto} alt="" className="max-w-full max-h-full rounded-2xl" />
          <button className="absolute top-6 right-6 text-white bg-slate-800/70 rounded-full p-2">
            <Icon name="close" size={24} />
          </button>
        </div>
      )}
    </div>
  );
};

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
